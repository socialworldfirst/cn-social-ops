<title>万里汇 · 海外主体 · KOL 十人短名单</title>
<style>
  :root {
    --bg: #f5f5f7; --panel: #ffffff; --panel-soft: #fafafb; --panel-tint: #f0f0f3;
    --ink: #1d1d1f; --ink-2: #424245; --ink-3: #6e6e73; --ink-4: #86868b; --ink-5: #a1a1a6;
    --line: #e5e5ea; --line-soft: #ececef; --line-strong: #d2d2d7;
    --imp: #0071e3; --imp-tint: #e3eeff; --ecom: #009688; --ecom-tint: #d9f0ee;
    --free: #b8650f; --free-tint: #fae9d2; --buyer: #c0392b; --buyer-tint: #fae0dc;
    --mute: #8e8e93; --mute-tint: #ececef;
    --sidebar-w: 258px; --radius: 10px; --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "PingFang SC", "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
  ::selection { background: #ffe066; }
  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }
  @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }
  aside.sidebar { background: var(--panel); border-right: 1px solid var(--line); position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; padding: 22px 18px 18px; }
  @media (max-width: 880px) { aside.sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); padding: 16px 18px; } }
  .brand { padding: 0 6px 18px; border-bottom: 1px solid var(--line-soft); margin-bottom: 18px; }
  .brand small { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; margin-bottom: 4px; }
  .brand strong { display: block; font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; line-height: 1.35; }
  .nav-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-5); font-weight: 600; padding: 14px 6px 8px; }
  .nav-label:first-of-type { padding-top: 0; }
  nav.toc { display: flex; flex-direction: column; gap: 1px; }
  nav.toc a { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; color: var(--ink-3); text-decoration: none; font-size: 13px; transition: background .12s ease, color .12s ease; line-height: 1.35; }
  nav.toc a:hover { background: var(--panel-tint); color: var(--ink); }
  nav.toc a.active { background: var(--imp-tint); color: var(--imp); }
  nav.toc a.active .num { color: var(--imp); }
  nav.toc a .num { font-size: 11px; color: var(--ink-5); font-variant-numeric: tabular-nums; font-weight: 600; width: 18px; flex-shrink: 0; }
  .sidebar-foot { margin-top: auto; padding: 14px 6px 0; border-top: 1px solid var(--line-soft); font-size: 11px; color: var(--ink-5); line-height: 1.6; }
  main.main { padding: 32px 56px 80px; max-width: 1200px; width: 100%; }
  @media (max-width: 720px) { main.main { padding: 24px 20px 64px; } }
  .tabbar { display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap; }
  .tabbar a { font-size: 13px; font-weight: 500; color: var(--ink-3); text-decoration: none; padding: 7px 14px; border-radius: 7px; border: 1px solid var(--line); background: var(--panel); transition: border-color .12s ease, color .12s ease; }
  .tabbar a:hover { border-color: var(--line-strong); color: var(--ink); }
  .tabbar a.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; margin-bottom: 24px; border-bottom: 1px solid var(--line); font-size: 12px; color: var(--ink-4); gap: 12px; flex-wrap: wrap; }
  .topbar .crumbs span { color: var(--ink-3); }
  .topbar .crumbs span + span::before { content: " / "; color: var(--ink-5); }
  .meta-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-pill { background: var(--panel); border: 1px solid var(--line); border-radius: 5px; padding: 3px 8px; font-size: 11px; color: var(--ink-3); }
  .meta-pill b { color: var(--ink); font-weight: 600; }
  .hero { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 28px 32px; margin-bottom: 24px; box-shadow: var(--shadow); }
  .hero h1 { font-size: 28px; line-height: 1.2; letter-spacing: -0.01em; font-weight: 600; margin: 0 0 12px; }
  .hero p.lede { font-size: 14.5px; color: var(--ink-3); margin: 0 0 20px; max-width: 780px; line-height: 1.7; }
  .hero p.lede strong { color: var(--ink-2); font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 12px 14px; }
  .stat b { display: block; font-size: 22px; font-weight: 600; color: var(--ink); line-height: 1.1; letter-spacing: -0.015em; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
  .stat span { font-size: 11px; color: var(--ink-4); letter-spacing: 0.02em; font-weight: 500; }
  .stat.buyer b { color: var(--buyer); } .stat.ecom b { color: var(--ecom); } .stat.free b { color: var(--free); }
  section.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 24px 28px 28px; margin-bottom: 18px; box-shadow: var(--shadow); scroll-margin-top: 16px; }
  .panel-head { display: flex; align-items: baseline; gap: 14px; padding-bottom: 14px; margin-bottom: 18px; border-bottom: 1px solid var(--line-soft); }
  .panel-head .badge { font-size: 10.5px; color: var(--ink-5); background: var(--panel-tint); padding: 3px 7px; border-radius: 4px; font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
  .panel-head .badge.a { color: var(--imp); background: var(--imp-tint); }
  .panel-head .badge.b { color: var(--ecom); background: var(--ecom-tint); }
  .panel-head .badge.c { color: var(--mute); background: var(--mute-tint); }
  .panel-head h2 { font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -0.01em; flex: 1; }
  .panel-head .head-meta { font-size: 11.5px; color: var(--ink-4); }
  .panel-sub { color: var(--ink-3); margin: 0 0 20px; font-size: 13.5px; max-width: 820px; line-height: 1.7; }
  .panel-sub strong { color: var(--ink-2); font-weight: 600; }
  p.body-p { font-size: 13.5px; color: var(--ink-2); max-width: 820px; margin: 0 0 14px; line-height: 1.75; }
  p.body-p strong { color: var(--ink); font-weight: 600; }
  .en { color: var(--ink-4); font-weight: 400; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 1100px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid-3, .grid-2 { grid-template-columns: 1fr; } }
  .card { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 16px 18px; display: flex; flex-direction: column; gap: 9px; }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sw-imp { background: var(--imp); } .sw-ecom { background: var(--ecom); } .sw-free { background: var(--free); } .sw-buyer { background: var(--buyer); } .sw-mute { background: var(--mute); }
  .tag { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: var(--ink-4); }
  .tag.imp { color: var(--imp); } .tag.ecom { color: var(--ecom); } .tag.free { color: var(--free); } .tag.buyer { color: var(--buyer); }
  .card .name { font-size: 15px; font-weight: 600; margin: 0; color: var(--ink); letter-spacing: -0.005em; }
  .card .essence { font-size: 12.8px; color: var(--ink-3); margin: 0; line-height: 1.6; }
  .card .essence strong { color: var(--ink-2); font-weight: 600; }
  .card .need { font-size: 11.5px; color: var(--ink-4); border-top: 1px solid var(--line-soft); padding-top: 8px; line-height: 1.55; }
  .card .need .lbl { font-weight: 600; color: var(--ink-3); margin-right: 6px; }
  .warn { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; background: #fff6df; border: 1px solid #f1d986; border-radius: 6px; font-size: 12.8px; color: #5b4310; margin-bottom: 16px; line-height: 1.6; }
  .warn .icon { font-weight: 700; color: #b87a13; flex-shrink: 0; }
  .warn strong { color: #3d2c0a; }
  .warn a { color: inherit; }
  .ok { background: #d9f0ee; border-color: #8fcfc7; color: #1f5a53; }
  .ok .icon { color: #00776b; }
  .ok strong { color: #0d423c; }
  .idx { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; overflow: auto; margin-bottom: 4px; }
  .idx table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 700px; }
  .idx th, .idx td { text-align: left; padding: 11px 13px; border-bottom: 1px solid var(--line-soft); vertical-align: top; line-height: 1.55; }
  .idx tbody tr:last-child td { border-bottom: 0; }
  .idx tbody tr:hover td { background: rgba(0,0,0,0.015); }
  .idx th { font-weight: 500; color: var(--ink-4); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; background: var(--panel-tint); white-space: nowrap; }
  .idx td.terr { font-weight: 600; color: var(--ink); min-width: 120px; }
  .idx td.terr small { display: block; font-weight: 400; color: var(--ink-4); font-size: 11.5px; margin-top: 3px; }
  .idx td.note { color: var(--ink-2); }
  .idx td.dim { color: var(--ink-3); font-size: 11.8px; }
  .good { color: var(--ecom); font-weight: 600; } .bad { color: var(--buyer); font-weight: 600; } .mid { color: var(--free); font-weight: 600; }
  .lyr { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin: 0 2px 2px 0; background: var(--panel-tint); color: var(--ink-3); white-space: nowrap; }
  .lyr.a { color: var(--imp); } .lyr.b { color: var(--ecom); } .lyr.c { color: var(--mute); }
  .frame { background: var(--panel-soft); border: 1px solid var(--line-soft); border-radius: 8px; padding: 20px 22px; }
  .frame h3 { font-size: 15px; font-weight: 600; margin: 0 0 10px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
  .frame ul { margin: 0; padding: 0; list-style: none; }
  .frame ul li { padding: 8px 0; border-top: 1px solid var(--line-soft); font-size: 12.8px; color: var(--ink-2); line-height: 1.65; }
  .frame ul li:first-child { border-top: 0; }
  .frame ul li strong { color: var(--ink); font-weight: 600; }
  .step { display: grid; grid-template-columns: 128px 1fr; gap: 18px; padding: 16px 0; border-top: 1px solid var(--line-soft); }
  .step:first-child { border-top: 0; padding-top: 4px; }
  .step .ph { font-size: 12.5px; font-weight: 600; color: var(--ink); }
  .step .ph span { display: block; font-size: 10.5px; color: var(--ink-4); font-weight: 500; margin-top: 2px; }
  .step .what h4 { font-size: 13.5px; font-weight: 600; margin: 0 0 6px; }
  .step .what ul { margin: 0; padding-left: 16px; font-size: 12.8px; color: var(--ink-2); line-height: 1.65; }
  .step .what ul li { margin-bottom: 4px; }
  .step .what ul li strong { color: var(--ink); font-weight: 600; }
  footer.foot { border-top: 1px solid var(--line); margin-top: 40px; padding-top: 20px; color: var(--ink-4); font-size: 12px; line-height: 1.8; }
  footer.foot a { color: var(--ink-3); }

  .persona { border: 1px solid var(--line-soft); border-radius: 10px; background: var(--panel-soft); padding: 18px 20px; }
  .persona .p-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .persona .p-head .p-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 5px; letter-spacing: 0.04em; background: var(--imp-tint); color: var(--imp); }
  .persona .p-head h3 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .persona .p-head .p-meta { font-size: 11.5px; color: var(--ink-4); margin-left: auto; }
  .persona .p-body { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .persona .p-body { grid-template-columns: 1fr; } }
  .persona .p-main p { font-size: 13px; color: var(--ink-2); margin: 0 0 8px; line-height: 1.7; }
  .persona .p-main p strong { color: var(--ink); font-weight: 600; }
  .persona .p-facts { display: flex; flex-direction: column; gap: 8px; }
  .persona .fact { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 7px; padding: 9px 12px; font-size: 12px; color: var(--ink-2); line-height: 1.55; }
  .persona .fact b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-5); font-weight: 600; margin-bottom: 2px; }
  .persona .need { font-size: 11.5px; color: var(--ink-4); padding-top: 6px; line-height: 1.55; }
</style>
<style>

  #gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg, #f5f5f7); z-index: 999; }
  #gate-card { background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 30px 32px; width: 330px; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04); text-align: left; }
  #gate-card small { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: #a1a1a6; font-weight: 600; }
  #gate-card h2 { font-size: 16px; font-weight: 600; margin: 6px 0 16px; color: #1d1d1f; letter-spacing: -0.01em; line-height: 1.4; }
  #gate-form { display: flex; gap: 8px; }
  #gate-input { flex: 1; padding: 9px 11px; border: 1px solid #d2d2d7; border-radius: 7px; font-size: 14px; outline: none; }
  #gate-input:focus { border-color: #0071e3; }
  #gate-btn { padding: 9px 16px; border: 0; border-radius: 7px; background: #1d1d1f; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }

<script>
const LSKEY = "cn_social_ops_pw";
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){const c=document.getElementById('content');c.innerHTML=html;c.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initScrollspy();}
function initScrollspy(){
  const links=[...document.querySelectorAll('nav.toc a')];
  const map=new Map(links.map(a=>[a.getAttribute('href').slice(1),a]));
  const obs=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.remove('active'));const a=map.get(e.target.id);if(a)a.classList.add('active');}});},{rootMargin:'-18% 0px -72% 0px',threshold:0});
  document.querySelectorAll('section.panel').forEach(s=>obs.observe(s));
}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const html=await decryptPayload(inp.value);reveal(html);try{localStorage.setItem(LSKEY,inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem(LSKEY);if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem(LSKEY);}catch(_){}}})();
</script>
