<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>海外主体 · Social Acquisition · Options &amp; Plays</title>
<style>
  :root{
    --bg:#f5f5f7;--panel:#fff;--panel-soft:#fafafb;--tint:#f0f0f3;
    --ink:#1d1d1f;--ink2:#424245;--ink3:#6e6e73;--ink4:#86868b;--ink5:#a1a1a6;
    --line:#e5e5ea;--line2:#ececef;--line3:#d2d2d7;
    --cheap:#1a8f4c;--cheap-t:#dff2e6;--mid:#b8650f;--mid-t:#fae9d2;--dear:#c0392b;--dear-t:#fae0dc;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 0 0 1px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
  ::selection{background:#ffe066}
  .wrap{max-width:960px;margin:0 auto;padding:44px 28px 90px}
  .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--ink5);font-weight:600;margin-bottom:8px}
  h1{font-size:29px;line-height:1.18;letter-spacing:-.015em;font-weight:600;margin:0 0 14px}
  .frame{background:var(--panel);border:1px solid var(--line);border-left:2px solid var(--ink);border-radius:10px;padding:16px 20px;font-size:13.5px;line-height:1.65;color:var(--ink2);box-shadow:var(--shadow);margin-bottom:8px}
  .frame b{color:var(--ink);font-weight:600}
  .anchors{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 30px}
  .anchor{flex:1;min-width:200px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px 16px;box-shadow:var(--shadow)}
  .anchor .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink4);font-weight:600;margin-bottom:3px}
  .anchor .v{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .anchor .v small{font-size:12px;color:var(--ink4);font-weight:500}
  .anchor.win .v{color:var(--cheap)}.anchor.bench .v{color:var(--dear)}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink4);font-weight:600;margin:34px 0 8px;padding-bottom:9px;border-bottom:1px solid var(--line)}
  .legend{font-size:11.5px;color:var(--ink4);margin:0 0 16px}
  .legend b{color:var(--ink3)}
  .play{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0;margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden}
  .play-top{display:grid;grid-template-columns:30px 1fr auto auto;gap:14px;align-items:center;padding:14px 18px}
  @media(max-width:680px){.play-top{grid-template-columns:26px 1fr;gap:8px}.metric{grid-column:span 1}}
  .play .rk{font-size:15px;font-weight:700;color:var(--ink4);font-variant-numeric:tabular-nums}
  .play .name h3{font-size:15px;font-weight:600;margin:0 0 2px;letter-spacing:-.005em}
  .play .name p{margin:0;font-size:12px;color:var(--ink4);line-height:1.5}
  .metric{text-align:right;min-width:104px}
  .metric .ml{font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink5);font-weight:600;margin-bottom:2px}
  .metric .mv{font-size:17px;font-weight:600;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1.1}
  .metric .mv small{font-size:11px;color:var(--ink4);font-weight:500}
  .cpa .mv{color:var(--tone)}
  .play.cheap{--tone:var(--cheap)}.play.mid{--tone:var(--mid)}.play.dear{--tone:var(--dear)}
  .heat{height:3px;width:100%;background:linear-gradient(90deg,var(--tone) 0%,var(--tone) var(--fill),transparent var(--fill))}
  .play-foot{padding:0 18px 13px;font-size:12px;color:var(--ink3);line-height:1.55;border-top:1px solid var(--line2);padding-top:11px;margin-top:2px}
  .play-foot b{color:var(--ink2);font-weight:600}
  .tag{display:inline-block;font-size:9.5px;font-weight:600;padding:1px 7px;border-radius:20px;margin-left:2px}
  .tag.cheap{background:var(--cheap-t);color:var(--cheap)}.tag.mid{background:var(--mid-t);color:var(--mid)}.tag.dear{background:var(--dear-t);color:var(--dear)}.tag.feed{background:var(--tint);color:var(--ink4)}
  .sum{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 22px;margin-top:16px;box-shadow:var(--shadow)}
  .sum h3{font-size:14px;font-weight:600;margin:0 0 8px}
  .sum p{margin:0 0 8px;font-size:13px;color:var(--ink2);line-height:1.7}
  .sum p b{color:var(--ink);font-weight:600}
  .sum .big{font-size:15px}
  ol.reason{list-style:none;counter-reset:r;margin:0;padding:0}
  ol.reason li{counter-increment:r;position:relative;padding:14px 0 14px 42px;border-top:1px solid var(--line2)}
  ol.reason li:first-child{border-top:0}
  ol.reason li::before{content:counter(r);position:absolute;left:0;top:13px;width:26px;height:26px;border-radius:50%;background:var(--tint);color:var(--ink3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
  ol.reason li h4{margin:0 0 4px;font-size:14px;font-weight:600;letter-spacing:-.005em}
  ol.reason li p{margin:0;font-size:13px;color:var(--ink2);line-height:1.7}
  ol.reason li p b{color:var(--ink);font-weight:600}
  .foot{margin-top:38px;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:var(--ink5);line-height:1.7}
  /* H2 OKR options */
  .okr-intro{font-size:13px;color:var(--ink3);margin:0 0 18px;line-height:1.65}
  .okr-intro b{color:var(--ink2);font-weight:600}
  .okr{background:var(--panel);border:1px solid var(--line);border-radius:11px;margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
  .okr.rec{border-color:#0071e3;box-shadow:0 0 0 1px #0071e3,var(--shadow)}
  .okr-hd{display:flex;align-items:center;gap:12px;padding:15px 20px 13px;border-bottom:1px solid var(--line2)}
  .okr-hd .lt{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
  .okr.a .lt{background:var(--cheap)}.okr.b .lt{background:#0071e3}.okr.c .lt{background:var(--mid)}
  .okr-hd .ht{flex:1}
  .okr-hd .ht h3{margin:0;font-size:15.5px;font-weight:600;letter-spacing:-.01em}
  .okr-hd .ht p{margin:2px 0 0;font-size:12px;color:var(--ink4)}
  .okr-hd .flag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0071e3;background:#e3eeff;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .okr-body{padding:14px 20px 16px}
  .obj{font-size:13px;color:var(--ink2);margin:0 0 12px;line-height:1.6}
  .obj b{color:var(--ink);font-weight:600}
  .krs{list-style:none;margin:0 0 12px;padding:0;display:grid;gap:6px}
  .krs li{font-size:12.5px;color:var(--ink2);padding-left:26px;position:relative;line-height:1.5}
  .krs li::before{content:"KR"counter(kr);counter-increment:kr;position:absolute;left:0;top:1px;font-size:8px;font-weight:700;color:var(--ink4);background:var(--tint);border-radius:3px;padding:1px 4px;letter-spacing:.02em}
  .krs{counter-reset:kr}
  .krs li b{color:var(--ink);font-weight:600}
  .ramp{display:flex;align-items:flex-end;gap:5px;height:62px;margin:0 0 12px;padding:8px 10px;background:var(--panel-soft);border:1px solid var(--line2);border-radius:8px}
  .ramp .mo{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .ramp .mo .bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;margin-bottom:3px}
  .okr.a .ramp .mo .bar{background:var(--cheap)}.okr.b .ramp .mo .bar{background:#0071e3}.okr.c .ramp .mo .bar{background:var(--mid)}
  .ramp .mo .n{font-size:9px;color:var(--ink3);font-variant-numeric:tabular-nums;font-weight:600}
  .ramp .mo .m{font-size:8px;color:var(--ink5);text-transform:uppercase;letter-spacing:.02em}
  .okr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line2);border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  @media(max-width:680px){.okr-stats{grid-template-columns:repeat(2,1fr)}}
  .okr-stats .st{background:var(--panel);padding:10px 13px}
  .okr-stats .st .l{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink5);font-weight:600;margin-bottom:2px}
  .okr-stats .st .v{font-size:16px;font-weight:600;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
  .okr-stats .st .v small{font-size:10.5px;color:var(--ink4);font-weight:500}
  .okr.a .st.hero .v{color:var(--cheap)}.okr.b .st.hero .v{color:#0071e3}.okr.c .st.hero .v{color:var(--mid)}
  .okr-req{font-size:11.5px;color:var(--ink3);margin:12px 0 0;line-height:1.55}
  .okr-req b{color:var(--ink2);font-weight:600}
  .gate{background:var(--panel-soft);border:1px solid var(--line2);border-radius:9px;padding:13px 18px;font-size:12.5px;color:var(--ink2);line-height:1.6;margin-top:4px}
  .gate b{color:var(--ink);font-weight:600}
  /* accordion */
  .okr-hd{width:100%;font:inherit;color:inherit;background:none;border:0;text-align:left;cursor:pointer;border-bottom:1px solid transparent}
  .okr-hd:hover{background:var(--panel-soft)}
  .okr.open .okr-hd{border-bottom-color:var(--line2)}
  .okr-mini{display:flex;gap:15px;font-size:12px;color:var(--ink4);white-space:nowrap}
  .okr-mini b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
  .chev{font-size:11px;color:var(--ink4);transition:transform .22s ease;flex-shrink:0;margin-left:2px}
  .okr.open .chev{transform:rotate(180deg)}
  .okr-detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .okr.open .okr-detail{max-height:1800px}
  @media(max-width:640px){.okr-mini{display:none}}
  .dsub{margin-top:16px}
  .dsub h5{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink4);font-weight:700;margin:0 0 8px}
  .dsub>p{margin:0;font-size:12.8px;color:var(--ink2);line-height:1.65}
  .dsub>p b{color:var(--ink);font-weight:600}
  .phase{display:grid;grid-template-columns:96px 1fr;gap:12px;padding:8px 0;border-top:1px solid var(--line2)}
  .phase:first-child{border-top:0}
  .phase .ph{font-size:12px;font-weight:600;color:var(--ink)}
  .phase .pd{font-size:12.3px;color:var(--ink2);line-height:1.55}
  .phase .pd b{color:var(--ink);font-weight:600}
  .st-line{font-size:11.8px;color:var(--ink3);margin-top:13px;padding-top:11px;border-top:1px solid var(--line2);line-height:1.55}
  .st-line b{color:var(--ink2);font-weight:600}

  /* clean OKR sheet */
  .okrsheet{background:var(--panel);border:1px solid var(--line);border-left:2px solid var(--ink);border-radius:12px;padding:22px 26px;box-shadow:var(--shadow);margin-bottom:14px}
  .okrsheet .obj-lead{font-size:16.5px;font-weight:600;letter-spacing:-.01em;margin:0 0 5px;line-height:1.4}
  .okrsheet .obj-sub{font-size:12px;color:var(--ink4);margin:0 0 17px;line-height:1.5}
  .okrsheet ol{list-style:none;counter-reset:kr2;margin:0;padding:0;display:grid;gap:10px}
  .okrsheet ol li{counter-increment:kr2;position:relative;padding-left:56px;font-size:13.5px;color:var(--ink2);line-height:1.55}
  .okrsheet ol li::before{content:"KR "counter(kr2);position:absolute;left:0;top:0;font-size:9.5px;font-weight:700;color:var(--ink4);background:var(--tint);border-radius:5px;padding:3px 7px;letter-spacing:.03em}
  .okrsheet ol li b{color:var(--ink);font-weight:600}
  .okrsheet ol li .kg{color:var(--cheap);font-weight:600}.okrsheet ol li .kr-red{color:var(--dear);font-weight:600}
  .bench-note{font-size:12px;color:var(--ink3);margin:2px 0 30px;line-height:1.6}
  .bench-note b{color:var(--ink2);font-weight:600}
</style>

  #gate-card small { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: #a1a1a6; font-weight: 600; }
  #gate-card h2 { font-size: 16px; font-weight: 600; margin: 6px 0 16px; color: #1d1d1f; letter-spacing: -0.01em; line-height: 1.4; }
  #gate-form { display: flex; gap: 8px; }
  #gate-input { flex: 1; padding: 9px 11px; border: 1px solid #d2d2d7; border-radius: 7px; font-size: 14px; outline: none; }
  #gate-input:focus { border-color: #0071e3; }
  #gate-btn { padding: 9px 16px; border: 0; border-radius: 7px; background: #1d1d1f; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
  #gate-err { color: #c0392b; font-size: 12px; margin-top: 10px; min-height: 14px; }
</style></head>

<script>
const LSKEY = "cn_social_ops_pw";
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){const c=document.getElementById('content');c.innerHTML=html;c.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initScrollspy();}
function initScrollspy(){
  const links=[...document.querySelectorAll('nav.toc a')];
  const map=new Map(links.map(a=>[a.getAttribute('href').slice(1),a]));
  const obs=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.remove('active'));const a=map.get(e.target.id);if(a)a.classList.add('active');}});},{rootMargin:'-18% 0px -72% 0px',threshold:0});
  document.querySelectorAll('section.panel').forEach(s=>obs.observe(s));
}
function toggleOkr(btn){var card=btn.closest(".okr"),o=card.classList.contains("open");document.querySelectorAll(".okr.open").forEach(function(c){c.classList.remove("open")});if(!o)card.classList.add("open");}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const html=await decryptPayload(inp.value);reveal(html);try{localStorage.setItem(LSKEY,inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem(LSKEY);if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem(LSKEY);}catch(_){}}})();
</script>
